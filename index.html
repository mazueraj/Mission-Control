<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    </style>
</head>
<body class="p-4">

    <!-- Header & Navigation -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Mission Control</h1>
        <button onclick="resetData()" class="text-xs text-red-500 font-medium">Reset Data</button>
    </div>

    <div class="flex space-x-2 mb-6 bg-gray-100 p-1 rounded-lg">
        <button onclick="showTab('goals')" id="btn-goals" class="flex-1 py-2 rounded-md text-sm font-semibold transition-all">Goals</button>
        <button onclick="showTab('expenses')" id="btn-expenses" class="flex-1 py-2 rounded-md text-sm font-semibold transition-all">Expenses</button>
        <button onclick="showTab('laura')" id="btn-laura" class="flex-1 py-2 rounded-md text-sm font-semibold transition-all">Laura</button>
    </div>

    <!-- Goals Tab (Mission 89kg) -->
    <div id="goals" class="tab-content active">
        <div class="card bg-blue-50 border-blue-100">
            <h2 class="text-sm uppercase tracking-wide text-blue-600 font-bold mb-1">Target Weight</h2>
            <div class="text-3xl font-black text-blue-900">89.0 <span class="text-lg font-normal">kg</span></div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card">
                <label class="block text-xs font-bold text-gray-500 uppercase">Current</label>
                <input type="number" id="currentWeight" step="0.1" class="w-full text-xl font-bold outline-none" placeholder="0.0" onchange="saveData()">
            </div>
            <div class="card">
                <label class="block text-xs font-bold text-gray-500 uppercase">Daily Cals</label>
                <input type="number" id="dailyCals" class="w-full text-xl font-bold outline-none" placeholder="2200" onchange="saveData()">
            </div>
        </div>
    </div>

    <!-- Expenses Tab -->
    <div id="expenses" class="tab-content">
        <div class="card">
            <h2 class="font-bold mb-4">Add Expense</h2>
            <div class="space-y-3">
                <input type="text" id="expDesc" placeholder="Description" class="w-full p-2 border rounded">
                <input type="number" id="expAmt" placeholder="Amount ($)" class="w-full p-2 border rounded">
                <button onclick="addExpense()" class="w-full bg-black text-white py-3 rounded-xl font-bold">Add Item</button>
            </div>
        </div>
        <div id="expenseList" class="space-y-2">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Laura Tab -->
    <div id="laura" class="tab-content">
        <div class="card border-pink-200 bg-pink-50">
            <h2 class="font-bold text-pink-700">Laura's Ledger</h2>
            <p class="text-sm text-pink-600">Track specific payments or shared goals here.</p>
        </div>
        <div id="lauraList" class="space-y-2"></div>
    </div>

    <script>
        let appData = {
            weight: 0,
            cals: 2200,
            expenses: [],
            lauraItems: []
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-white', 'shadow-sm'));
            
            document.getElementById(tabId).classList.add('active');
            const btn = document.getElementById('btn-' + tabId);
            btn.classList.add('bg-white', 'shadow-sm');
        }

        function saveData() {
            appData.weight = document.getElementById('currentWeight').value;
            appData.cals = document.getElementById('dailyCals').value;
            localStorage.setItem('missionControlData', JSON.stringify(appData));
        }

        function addExpense() {
            const desc = document.getElementById('expDesc').value;
            const amt = document.getElementById('expAmt').value;
            if(!desc || !amt) return;

            appData.expenses.push({ desc, amt, date: new Date().toLocaleDateString() });
            document.getElementById('expDesc').value = '';
            document.getElementById('expAmt').value = '';
            saveData();
            renderExpenses();
        }

        function renderExpenses() {
            const list = document.getElementById('expenseList');
            list.innerHTML = appData.expenses.map((item, index) => `
                <div class="flex justify-between items-center p-3 border-b">
                    <div>
                        <div class="font-medium">${item.desc}</div>
                        <div class="text-xs text-gray-400">${item.date}</div>
                    </div>
                    <div class="font-bold">$${item.amt}</div>
                </div>
            `).join('');
        }

        function resetData() {
            if(confirm('Clear all data?')) {
                localStorage.removeItem('missionControlData');
                location.reload();
            }
        }

        // Initialize
        window.onload = () => {
            const saved = localStorage.getItem('missionControlData');
            if(saved) {
                appData = JSON.parse(saved);
                document.getElementById('currentWeight').value = appData.weight;
                document.getElementById('dailyCals').value = appData.cals;
                renderExpenses();
            }
            showTab('goals');
        };
    </script>
</body>
</html>
