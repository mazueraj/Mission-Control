<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Essential for the "App" feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Mission Control</title>
    <style>
        :root {
            --julian-blue: #2c3e50;
            --laura-pink: #8e44ad;
            --accent-orange: #e67e22;
            --bg-gray: #f4f7f6;
            --success-green: #27ae60;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-gray); 
            margin: 0;
            padding: 10px;
            display: flex; 
            justify-content: center; 
        }
        .card { background: white; width: 100%; max-width: 650px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .next-pay { font-size: 0.85em; color: var(--accent-orange); font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        #deadline-alert { 
            display: none; background: #fff3cd; color: #856404; border: 1px solid #ffeeba;
            padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;
            font-size: 0.9em; font-weight: bold; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(230, 126, 34, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(230, 126, 34, 0); }
            100% { box-shadow: 0 0 0 0px rgba(230, 126, 34, 0); }
        }

        .selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        button.user-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; background: #ddd; color: #777; font-size: 0.9em;
        }
        button.active-j { background: var(--julian-blue); color: white; }
        button.active-l { background: var(--laura-pink); color: white; }

        .reset-container { text-align: center; margin-bottom: 20px; }
        .reset-btn { 
            width: 100%; background: var(--success-green); color: white; border: none; padding: 14px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1em;
        }

        .checklist-item { display: flex; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid #eee; }
        input[type="checkbox"] { transform: scale(1.4); margin-top: 4px; margin-right: 15px; min-width: 20px; }
        .content { flex-grow: 1; }
        .action-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 1em; color: #333; }
        .amount { color: var(--accent-orange); margin-left: 10px; }
        .target-label { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; text-transform: uppercase; margin-top: 5px; background: #f0f4f8; color: #546e7a; font-weight: bold; border: 1px solid #d1d9e0; }
        .note-box { font-size: 0.8em; color: #666; margin-top: 8px; background: #fff9f4; padding: 8px; border-radius: 6px; border-left: 3px solid var(--accent-orange); }
        .buffer-item { background: #f0fdf4; border: 1px solid #dcfce7; border-radius: 10px; margin-top: 10px; padding: 10px; }
        .checked { opacity: 0.35; filter: grayscale(1); }
        .checked .action-row { text-decoration: line-through; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="letter-spacing: 1px; margin: 0; color: #2c3e50;">MISSION CONTROL</h2>
        <div id="pay-date-display" class="next-pay">Loading Next Launch...</div>
    </div>

    <div id="deadline-alert">⚠️ STRATEGIC OVERDUE: Next pay is < 5 days away!</div>

    <div class="selector">
        <button id="btnJ" class="user-btn active-j" onclick="loadProfile('julian')">JULIAN</button>
        <button id="btnL" class="user-btn" onclick="loadProfile('laura')">LAURA</button>
    </div>

    <div class="reset-container">
        <button class="reset-btn" onclick="resetChecklist()">ALL PAID! (RESET)</button>
    </div>

    <div id="list-container"></div>
</div>

<script>
    let currentPerson = 'julian';
    let nextPayDateObj = null;
    
    // Reference dates for 2026
    const baseDates = {
        julian: new Date(2026, 3, 28), 
        laura: new Date(2026, 3, 29)   
    };

    const data = {
        julian: [
            { action: "Transfer to Home & Mortgage", amt: 1965.38, target: "Online Mortgage", note: "Fixed bills bundle" },
            { action: "Pay ANZ Reward Card + PT", amt: 340.00, target: "Credit Card", note: "$200 CC + $140 PT" },
            { action: "Pay Body Corporate (Rhapsody)", amt: 243.44, target: "Online Saver", note: "Biller 96503 | Ref 24670484510000000191" },
            { action: "Transfer to Schooling/Tutoring", amt: 300.00, target: "Online Saver", note: "Education Buffer" },
            { action: "Transfer to Watch/Emilio Funds", amt: 200.00, target: "Progress Saver", note: "$100 Watch | $100 Martin Emilio" },
            { action: "Transfer to Body Corporate (Inv)", amt: 144.00, target: "Online Transfers", note: "Inv Levy" },
            { action: "Hold for Health & Subs", amt: 85.00, target: "Access Advantage", note: "Keep for Direct Debits" },
            { action: "Transfer to Project Snowflake", amt: 441.00, target: "Progress Saver", note: "Internal Transfer" },
            { action: "REMAINING SPENDING CASH", amt: 958.13, target: "Access Advantage", note: "Julian's Buffer", isBuffer: true }
        ],
        laura: [
            { action: "Pay Hillcrest Oli", amt: 534.00, target: "Laura payments", note: "Education" },
            { action: "Pay Groceries", amt: 450.00, target: "ANZ Rewards Plat", note: "Food Budget" },
            { action: "Pay Body Corporate (Riverlily)", amt: 204.85, target: "Laura access", note: "StrataPay: 74625 | Ref: 158730786" },
            { action: "Pay Medibank", amt: 155.00, target: "Laura payments", note: "Health Insurance" },
            { action: "Pay Travel/Credit Card", amt: 150.00, target: "Travel Credit Card", note: "Repayments" },
            { action: "Pay Piano (Martin)", amt: 114.00, target: "Laura access", note: "Lessons" },
            { action: "Transfer to Colombia", amt: 110.00, target: "Laura access", note: "Family Support" },
            { action: "Pay Electricity & Gas", amt: 108.61, target: "Laura access", note: "Utilities" },
            { action: "Pay EMF Gym", amt: 90.00, target: "Laura access", note: "Fortnightly" },
            { action: "Pay Kids Activities", amt: 95.00, target: "Laura access", note: "$55 Swim + $40 OSHC" },
            { action: "Pay Subscriptions & Flexi", amt: 64.30, target: "Laura payments", note: "$34.30 Subs + $30 Flexi" },
            { action: "Cash for Personal & Dining", amt: 420.00, target: "Cash", note: "$300 Dining + $120 Spend" },
            { action: "REMAINING SPENDING CASH", amt: 604.24, target: "Laura Access", note: "Laura's Buffer", isBuffer: true }
        ]
    };

    function calculateNextPay(person) {
        const today = new Date();
        let nextPay = new Date(baseDates[person]);
        while (nextPay < today) {
            nextPay.setDate(nextPay.getDate() + 14);
        }
        nextPayDateObj = nextPay;
        const options = { weekday: 'short', day: 'numeric', month: 'short' };
        document.getElementById('pay-date-display').innerText = `Next Launch: ${nextPay.toLocaleDateString('en-AU', options)}`;
        checkDeadlineAlert();
    }

    function checkDeadlineAlert() {
        const today = new Date();
        const diffTime = nextPayDateObj - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const unchecked = document.querySelectorAll('input[type="checkbox"]:not(:checked)').length;
        document.getElementById('deadline-alert').style.display = (diffDays <= 5 && unchecked > 0) ? 'block' : 'none';
    }

    function loadProfile(person) {
        currentPerson = person;
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        document.getElementById('btnJ').className = 'user-btn ' + (person === 'julian' ? 'active-j' : '');
        document.getElementById('btnL').className = 'user-btn ' + (person === 'laura' ? 'active-l' : '');
        data[person].forEach((itemData, index) => {
            const item = document.createElement('div');
            item.className = 'checklist-item' + (itemData.isBuffer ? ' buffer-item' : '');
            item.innerHTML = `
                <input type="checkbox" onclick="toggleCheck(this)">
                <div class="content">
                    <div class="action-row"><span>${itemData.action}</span><span class="amount">$${itemData.amt.toFixed(2)}</span></div>
                    <div class="target-label">Target: ${itemData.target}</div>
                    <div class="note-box">${itemData.note}</div>
                </div>`;
            container.appendChild(item);
        });
        calculateNextPay(person);
    }

    function toggleCheck(cb) {
        cb.parentElement.classList.toggle('checked', cb.checked);
        checkDeadlineAlert();
    }

    function resetChecklist() {
        if(confirm("Confirm all paid?")) {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
                cb.parentElement.classList.remove('checked');
            });
            checkDeadlineAlert();
        }
    }
    loadProfile('julian');
</script>
</body>
</html>
