<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mission Control</title>
    
    <!-- PWA / APP SETTINGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mission">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Manifest for Android Install -->
    <link rel="manifest" href="data:application/manifest+json,{'name':'Mission Control','short_name':'Mission','start_url':'.','display':'standalone','background_color':'#f4f7f6','theme_color':'#2c3e50','icons':[{'src':'https://img.icons8.com/fluency/180/rocket.png','sizes':'180x180','type':'image/png'}]}">

    <!-- ICONS -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/rocket.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/rocket.png">

    <style>
        :root {
            --julian-blue: #2c3e50;
            --laura-pink: #8e44ad;
            --accent-orange: #e67e22;
            --bg-gray: #f4f7f6;
            --success-green: #27ae60;
        }

        html, body { 
            overflow-x: hidden; 
            height: 100%;
            margin: 0;
            background: var(--bg-gray);
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: env(safe-area-inset-top) 20px 40px 20px; 
            display: flex; 
            justify-content: center; 
        }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 650px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            padding: 25px; 
            margin-top: 10px;
            height: fit-content;
            margin-bottom: 50px;
        }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f8f8f8; padding-bottom: 15px; }
        .next-pay { font-size: 0.85em; color: var(--accent-orange); font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        #deadline-alert { 
            display: none; background: #fff3cd; color: #856404; border: 1px solid #ffeeba;
            padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center;
            font-weight: bold; animation: pulse 2s infinite; font-size: 0.9em;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .selector { 
            display: flex; 
            background: #eee;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px; 
        }
        
        button.user-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; background: transparent; color: #777; font-size: 0.9em;
        }
        
        button.active-j { background: var(--julian-blue); color: white; }
        button.active-l { background: var(--laura-pink); color: white; }

        .reset-btn { 
            width: 100%; background: var(--success-green); color: white; border: none; padding: 18px; 
            border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 1em; margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .checklist-item { display: flex; align-items: flex-start; padding: 18px 0; border-bottom: 1px solid #f1f1f1; }
        input[type="checkbox"] { 
            width: 28px; height: 28px; margin-top: 2px; margin-right: 15px; accent-color: var(--success-green);
        }
        
        .content { flex-grow: 1; }
        .action-row { display: flex; justify-content: space-between; font-weight: 700; color: #333; font-size: 1.05em; }
        .amount { color: var(--accent-orange); }
        .target-label { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.7em; text-transform: uppercase; margin-top: 8px; background: #f0f4f8; color: #546e7a; font-weight: bold; border: 1px solid #e2e8f0; }
        .note-box { font-size: 0.85em; color: #666; margin-top: 10px; background: #fffaf5; padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent-orange); line-height: 1.4; }
        
        .buffer-item { background: #f0fdf4; border: 1px solid #dcfce7; border-radius: 14px; padding: 15px; margin-top: 12px; }
        .checked { opacity: 0.25; filter: grayscale(1); }
        .checked .action-row { text-decoration: line-through; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1 style="letter-spacing: 1px; margin: 0; color: #2c3e50; font-size: 1.6em;">🚀 MISSION CONTROL</h1>
        <div id="pay-date-display" class="next-pay">Next Launch: Loading...</div>
    </div>

    <div id="deadline-alert">⚠️ OVERDUE: Transfer window closing!</div>

    <div class="selector">
        <button id="btnJ" class="user-btn active-j" onclick="loadProfile('julian')">Julian</button>
        <button id="btnL" class="user-btn" onclick="loadProfile('laura')">Laura</button>
    </div>

    <button class="reset-btn" onclick="resetChecklist()">MISSION COMPLETE (RESET)</button>

    <div id="list-container"></div>
</div>

<script>
    let currentPerson = 'julian';
    let nextPayDateObj = null;
    
    const baseDates = {
        julian: new Date(2026, 3, 28), 
        laura: new Date(2026, 3, 29)   
    };

    const data = {
        julian: [
            { id: "j1", action: "Mortgage & Fixed Bills", amt: 1965.38, target: "Online Mortgage", note: "Fixed bundle (ME Bank, Solar, Ins, Travel)" },
            { id: "j2", action: "Tennis Coaching", amt: 300.00, target: "Online Saver Transfers", note: "Weekly sessions budget" },
            { id: "j3", action: "ANZ Rewards + PT", amt: 340.00, target: "Credit Card", note: "$200 CC + $140 Personal Trainer" },
            { id: "j4", action: "Body Corp (Rhapsody)", amt: 243.44, target: "Online Saver Transfers", note: "BPAY: Biller 96503 | Ref: 246704845" },
            { id: "j5", action: "Council Rates (Rhap)", amt: 95.00, target: "Online Saver Transfers", note: "Provision for rates" },
            { id: "j6", action: "Water Rates (Rhap)", amt: 50.00, target: "Online Saver Transfers", note: "Provision for water" },
            { id: "j7", action: "Schooling/Tutoring", amt: 300.00, target: "Online Saver Transfers", note: "Future fees buffer" },
            { id: "j8", action: "Watch & Emilio Funds", amt: 200.00, target: "Progress Saver", note: "$100 Watch | $100 Martin Emilio" },
            { id: "j9", action: "Project Snowflake", amt: 441.00, target: "Progress Saver", note: "Internal Transfer" },
            { id: "j10", action: "Health & Subs", amt: 85.00, target: "Access Advantage", note: "Hold for direct debits" },
            { id: "j11", action: "REMAINING SPENDING", amt: 513.13, target: "Access Advantage", note: "Julian's Buffer", isBuffer: true }
        ],
        laura: [
            { id: "l1", action: "Hillcrest Oli", amt: 534.00, target: "Laura Payments", note: "School/Care fees" },
            { id: "l2", action: "Groceries", amt: 450.00, target: "ANZ Rewards Plat", note: "Household grocery budget" },
            { id: "l3", action: "Body Corp (Riverlily)", amt: 204.85, target: "Laura Access", note: "Based on latest levy" },
            { id: "l4", action: "Medibank", amt: 155.00, target: "Laura Payments", note: "Health insurance" },
            { id: "l5", action: "Electricity & Gas", amt: 108.61, target: "Laura Access", note: "Utilities bundle" },
            { id: "l6", action: "Dining & Shopping", amt: 420.00, target: "Cash", note: "$300 Dining + $120 Shopping" },
            { id: "l7", action: "REMAINING SPENDING", amt: 604.24, target: "Laura Access", note: "Laura's Buffer", isBuffer: true }
        ]
    };

    function saveCheckState(id, isChecked) {
        localStorage.setItem('mission_' + id, isChecked);
    }

    function getCheckState(id) {
        return localStorage.getItem('mission_' + id) === 'true';
    }

    function calculateNextPay(person) {
        const today = new Date();
        let nextPay = new Date(baseDates[person]);
        while (nextPay < today) { nextPay.setDate(nextPay.getDate() + 14); }
        nextPayDateObj = nextPay;
        document.getElementById('pay-date-display').innerText = `Next Launch: ${nextPay.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' })}`;
        checkDeadlineAlert();
    }

    function checkDeadlineAlert() {
        const diffDays = Math.ceil((nextPayDateObj - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById('deadline-alert').style.display = (diffDays <= 5) ? 'block' : 'none';
    }

    function loadProfile(person) {
        currentPerson = person;
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        document.getElementById('btnJ').className = 'user-btn ' + (person === 'julian' ? 'active-j' : '');
        document.getElementById('btnL').className = 'user-btn ' + (person === 'laura' ? 'active-l' : '');

        data[person].forEach((itemData) => {
            const isChecked = getCheckState(itemData.id);
            const item = document.createElement('div');
            item.className = 'checklist-item' + (itemData.isBuffer ? ' buffer-item' : '') + (isChecked ? ' checked' : '');
            
            item.innerHTML = `
                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="handleCheck(this, '${itemData.id}')">
                <div class="content">
                    <div class="action-row">
                        <span>${itemData.action}</span>
                        <span class="amount">$${itemData.amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                    </div>
                    <div class="target-label">Target: ${itemData.target}</div>
                    <div class="note-box">${itemData.note}</div>
                </div>
            `;
            container.appendChild(item);
        });
        calculateNextPay(person);
    }

    function handleCheck(cb, id) {
        cb.parentElement.classList.toggle('checked', cb.checked);
        saveCheckState(id, cb.checked);
    }

    function resetChecklist() {
        if(confirm("Reset all transfers for the new pay cycle?")) { 
            data.julian.forEach(i => localStorage.removeItem('mission_' + i.id));
            data.laura.forEach(i => localStorage.removeItem('mission_' + i.id));
            loadProfile(currentPerson); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    // Initialize
    loadProfile('julian');
</script>

</body>
</html>
